<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Vibe Check</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            transition: background 0.5s ease; 
        }

        .weather-container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            text-align: center;
            width: 320px;
        }

        h1 { margin-bottom: 20px; color: #333; }

        input {
            padding: 12px;
            width: 65%;
            border: 2px solid #eee;
            border-radius: 8px;
            outline: none;
            transition: border 0.3s;
        }

        input:focus { border-color: #4facfe; }

        button {
            padding: 12px;
            background: #4facfe;
            border: none;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover { background: #00c6ff; }

        .result {
            margin-top: 25px;
            min-height: 100px;
        }

        .vibe-text {
            display: block;
            margin-top: 15px;
            font-style: italic;
            font-weight: bold;
            color: #555;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>

    <div class="weather-container">
        <h1>Weather Vibe Check ☁️</h1>
        <form id="weatherForm">
            <input type="text" id="cityInput" placeholder="Enter city (e.g. Bhopal)" required>
            <button type="submit">Get Info</button>
        </form>
        
        <div id="weatherResult" class="result">
            <p>Type a city to see if it's a disaster.</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
